<html>
    <head>
        <title>Refude Power</title>
        <meta charset="UTF-8">
        <script src="../common/angular.js"></script>
        <script src="power.js"></script>
        <script src="../common/zoom.js"></script>
        <link rel="stylesheet" href="../common/refude.css"/>
        <link rel="stylesheet" href="power.css"/>
    </head>
    <body ng-app="power"  ng-controller="powerCtrl as ctrl" ng-keydown="onKeyDown($event)">
		<div class="list">
			<div class="line heading">
				Leave
			</div>
            <div ng-repeat="action in actions" 
				 ng-click="select(action)"
				 ng-dblclick="selectAndExecute(action)" 
				 id="{{action.actionId}}" ng-class="actionClass(action)">
                <div class="line-icon"><img ng-src='{{iconUrl(action)}}' height="32" width="32" alt=" " border="0"/></div>
                <div class="line-title">{{action.description}}</div>
            </div>
        </div> 
    </body>
</html>
