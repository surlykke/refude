<html>
    <head>
        <title>Refude Power</title>
        <meta charset="UTF-8">
        <script src="angular.js"></script>
        <script src="power.js"></script>
        <link rel="stylesheet" href="power.css"/>
    </head>
    <body ng-app="power"  ng-controller="powerCtrl as ctrl">
        <div class="powerButton" ng-repeat="action in actions"> 
            <img ng-src={{iconUrl(action)}} height="32" width="32" alt=" "/>
            {{action.description}} 
        </div>
    </body>
</html>
