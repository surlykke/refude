<html>
    <head>
        <title>Refude Do</title>
        <meta charset="UTF-8">
        <script src="../common/angular.js"></script>
        <script src="../common/zoom.js"></script>
        <script src="../common/utils.js"></script>

        <script src="do.js"></script>
        <link rel="stylesheet" href="../common/refude.css"/>
        <link rel="stylesheet" href="do.css"/>
    </head>
    <body ng-app="do" ng-controller="doCtrl as ctrl" ng-keydown="onKeyDown($event)" class="content">
        <div class="left">
            <div class="searchInput">
                <input type="search" autofocus ng-model="searchTerm"/>
            </div>
            <div class="list" id="contentBox">
                <div ng-repeat="actionUrl in filteredUrls"
                    ng-click="select(actionUrl)"
                    ng-dblclick="selectAndExecute(actionUrl)" 
                    ng-class="actionClass(actionUrl)"
                    id="{{actionUrl}}">
                    <div class="line-icon">
                        <img ng-src='{{action(actionUrl).IconUrl}}' height="32" width="32" alt=" " border="0"/>
                    </div>
                    <div class="line-title">{{action(actionUrl).Name}}</div>
                    <div class="line-comment">{{action(actionUrl).Comment}}</div>
                </div>
            </div>
        </div>

        <!-- graphical depiction of open windows -->
        <div id="disp" class="display">
            <div ng-repeat="actionUrl in filteredUrls" 
			     ng-if="action(actionUrl).X != undefined" class="window" ng-style="style(actionUrl, $index)">
                <div class="windowTitle">
                    <img ng-src="{{action(actionUrl).IconUrl}}" height="10" width="10" alt =" "/>
                    {{action(actionUrl).name}}
                </div>
            </div>
        </div>
    </body>
</html>
