<html>
    <head>
        <title>Refude Do</title>
        <meta charset="UTF-8">
        <script src="common/angular.js"></script>
        <script src="common/utils.js"></script>
        <script src="common/resourcecollection.js"></script>
		<script src="hideshow.js"></script>
		<script src="do.js"></script>
        <link rel="stylesheet" href="../common/refude.css"/>
        <link rel="stylesheet" href="do.css"/>
    </head>
    <body ng-app="do" ng-controller="doCtrl as ctrl" ng-keydown="onKeyDown($event)" class="content">
        <div class="left">
            <div class="searchInput">
                <input type="search" autofocus ng-model="searchTerm"/>
            </div>
            <div class="list" id="contentBox">
                <div ng-repeat="action in actions"
                    ng-click="select(action)"
                    ng-dblclick="selectAndExecute(action)" 
                    ng-class="actionClass(action)"
                    id="{{action.url}}">
                    <div class="line-icon">
                        <img ng-src='{{action.IconUrl}}' height="32" width="32" alt=" " border="0"/>
                    </div>
                    <div class="line-title">{{action.Name}}</div>
                    <div class="line-comment">{{action.Comment}}</div>
                </div>
            </div>
        </div>

        <!-- graphical depiction of open windows -->
        <div id="disp" class="display">
            <div ng-repeat="action in actions" ng-if="action.X != undefined" class="window" ng-style="style(action, $index)">
                <div class="windowTitle">
                    <img ng-src="{{action.IconUrl}}" height="10" width="10" alt =" "/>
                    {{action.name}}
                </div>
            </div>
        </div>
    </body>
</html>
