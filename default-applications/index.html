<!DOCTYPE html>
<html>
    <head>
        <title>Default applications</title>
        <meta charset="UTF-8">
        <script src="angular.js"></script>
        <script src="angular-aria.js"></script>
        <script src="index.js"></script>
        <script src="components/mimetypelist/mimetypelist.js"></script>
        <script src="components/applist/applist.js"></script>
        <link rel="stylesheet" href="app.css"/>
    </head>
    <body ng-app="appConfig" ng-controller="mainCtrl as ctrl">
        <mimetypelist ng-show="!$ctrl.mt" mt="$ctrl.mt"></mimetypelist>
        <applist ng-if="$ctrl.mt" mt="$ctrl.mt"></applist>
    </body>
</html>
